name: CMR Checks
on:
  workflow_dispatch:
  push:
    branches: [ master, main, feature/**, CMR-**, cmr-**]
  pull_request:
    branches: [ master, main , features/**, CMR-**, cmr-**]
jobs:
  cloc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove non-CMR directories
        run: |
          rm -rf legacy-migration
          rm -rf other
          rm -rf system-validation-test
          rm -rf tea-config-generator
          rm -rf token-service-client
      - name: Count Lines of Code (cloc)
        uses: djdefi/cloc-action@6
  kondo:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Run Kondo Report
        id: gen-report
        run: ./dev-system/support/run-kondo.sh -a >> report.log
      - name: Show Kondo Report
        id: show-report
        if: always()
        run: cat report.log
      - name: Publish Kondo Report
        id: pub-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Kondo-Report.txt
          path: report.log
  self-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          clj-kondo: '2026.05.25'
      - name: Lint
        run: |
          clj-kondo --lint $(find . -maxdepth 1 -mindepth 1 -type d \
            -not -name "indexer-app" \
            -not -name "ingest-app" \
            -not -name "metadata-db-app" \
            -not -name "mock-echo-app" \
            -not -name "search-app" \
            -not -name ".*" \
            -printf '%f\n')